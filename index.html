<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waste Collection Reminder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="app-header">
        <h1>Waste Collection Reminder</h1>
        <p>Never miss a garbage collection day again</p>
    </header>

    <main>

        <!-- Address input section -->
        <section id="address-section" class="card">
            <h2>Enter your address</h2>
            <p>We will show you the waste collection schedule for your location.</p>

            <input
              type="text"
              id="addressInput"
              placeholder="Enter street name"
              autocomplete="off">
            
            <div id="suggestions" class="suggestions"></div>
            
            <input type="email" id="emailInput" placeholder="Enter email address" required />

            <button id="saveAddressBtn">Save</button>

<p id="addressStatus" class="status-text"></p>
        </section>


        <!-- Calendar section -->
        <section id="calendar-section" class="card hidden">
            <h2>Collection schedule</h2>

            <!-- Future range selector -->
            <label for="rangeSelect">Show future dates:</label>
            <select id="rangeSelect">
                <option value="3">Next 3 months</option>
                <option value="6">Next 6 months</option>
                <option value="12">Next 12 months</option>
            </select>

            <div id="wasteTypes">
                <button class="waste-btn" data-type="mixed">Mixed Waste</button>
                <button class="waste-btn" data-type="plastic">Plastic</button>
                <button class="waste-btn" data-type="paper">Paper</button>
                <button class="waste-btn" data-type="glass">Glass</button>
                <button class="waste-btn" data-type="bio">Bio Waste</button>
            </div>

            <div id="calendarContainer">
                <!-- Calendar will be generated by JS -->
            </div>
        </section>

        <!-- Notification settings -->
        <section id="notification-section" class="card hidden">
            <h2>Notifications</h2>
            <label>
                <input type="checkbox" id="notifyToggle">
                Enable reminders before collection day
            </label>
        </section>

    </main>

    <footer>
        <p>Smart City Prototype – Waste Collection Reminder</p>
    </footer>

    <!-- Link your JS here -->
    <script src="js/app.js"></script>
</body>
</html>
